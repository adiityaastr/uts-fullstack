version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: employee_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: uts_employee_db
      MYSQL_USER: employee_user
      MYSQL_PASSWORD: employee_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./411231139_muhamad_aditya_saputra.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - employee_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: employee_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: employee_user
      DB_PASSWORD: employee_pass
      DB_NAME: uts_employee_db
      JWT_SECRET: ${JWT_SECRET:-default_jwt_secret_change_this}
      SESSION_SECRET: ${SESSION_SECRET:-default_session_secret_change_this}
      PORT: 3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - employee_network

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  employee_network:
    driver: bridge
